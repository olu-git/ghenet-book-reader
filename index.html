<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ghenet's Library</title>

  <meta property="og:title" content="Ghenet's Library" />
  <meta property="og:description" content="Upload a book and let it read to you." />
  <meta property="og:image" content="https://olu-git.github.io/ghenet-book-reader/ghenet-photo.jpeg" />
  <meta property="og:url" content="https://olu-git.github.io/ghenet-book-reader" />
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300&family=Karla:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --forest: #1d3a2f;        /* page background — deep library green */
      --forest-soft: #274a3c;
      --cream: #f7f3ea;         /* card */
      --cream-dim: #efe9db;
      --ink: #20261f;
      --ink-soft: #56604f;
      --ink-faint: #8b937f;
      --brass: #b8863b;         /* accent — warm brass */
      --brass-deep: #92671f;
      --brass-soft: #f3e8d3;
      --line: rgba(32, 38, 31, 0.14);
      --serif: 'Fraunces', Georgia, serif;
      --sans: 'Karla', system-ui, sans-serif;
    }

    body {
      font-family: var(--sans);
      color: var(--ink);
      min-height: 100vh;
      background: var(--forest);
      padding: 3.5rem 1.25rem 4rem;
      display: flex;
      justify-content: center;
    }

    .shelf { width: 100%; max-width: 600px; }

    /* ---------- title ---------- */
    .masthead {
      text-align: center;
      margin-bottom: 2.25rem;
    }

    .masthead h1 {
      font-family: var(--serif);
      font-weight: 400;
      font-size: clamp(34px, 7vw, 48px);
      color: var(--cream);
      letter-spacing: 0.01em;
    }

    .masthead .rule {
      width: 56px;
      height: 2px;
      background: var(--brass);
      margin: 14px auto 0;
    }

    /* ---------- upload ---------- */
    #drop-zone {
      border: 1.5px dashed rgba(247,243,234,0.4);
      border-radius: 18px;
      padding: 3.25rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      color: var(--cream);
    }

    #drop-zone:hover, #drop-zone:focus-visible, #drop-zone.drag {
      border-color: var(--brass);
      background: var(--forest-soft);
      outline: none;
    }

    #drop-zone .dz-glyph {
      font-family: var(--serif);
      font-size: 38px;
      font-weight: 300;
      color: var(--brass);
      line-height: 1;
      margin-bottom: 0.875rem;
    }

    #drop-zone p { font-size: 16px; font-weight: 500; }
    #drop-zone span { font-size: 13.5px; opacity: 0.65; display: block; margin-top: 5px; }
    #file-input { display: none; }

    #loading-msg {
      display: none;
      text-align: center;
      padding: 3rem 2rem;
      font-family: var(--serif);
      font-style: italic;
      font-size: 17px;
      color: var(--cream);
      opacity: 0.85;
    }

    /* ---------- reader card ---------- */
    #reader { display: none; }

    .card {
      background: var(--cream);
      border-radius: 20px;
      padding: 1.875rem;
      box-shadow: 0 18px 60px rgba(0,0,0,0.3);
    }

    .book-meta { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
    .book-name {
      font-family: var(--serif);
      font-size: 24px;
      font-weight: 400;
      color: var(--ink);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .book-pages { font-size: 13px; color: var(--ink-faint); margin: 4px 0 1.375rem; }

    .reset-btn {
      font-family: var(--sans);
      font-size: 13px;
      color: var(--ink-soft);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      flex-shrink: 0;
    }
    .reset-btn:hover { color: var(--brass-deep); }

    .text-preview {
      font-family: var(--serif);
      font-weight: 300;
      font-size: 16.5px;
      line-height: 1.85;
      color: var(--ink-soft);
      max-height: 140px;
      overflow-y: auto;
      padding: 1.125rem 1.25rem;
      background: var(--cream-dim);
      border-radius: 12px;
      margin-bottom: 1.5rem;
    }

    /* ---------- timeline ---------- */
    .timeline-wrap { margin-bottom: 1.375rem; }

    .timeline-labels {
      display: flex;
      justify-content: space-between;
      font-size: 12.5px;
      color: var(--ink-faint);
      margin-top: 6px;
    }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: var(--line);
      outline: none;
      cursor: pointer;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--brass);
      border: 3px solid var(--cream);
      box-shadow: 0 1px 4px rgba(0,0,0,0.25);
      cursor: grab;
    }

    input[type=range]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--brass);
      border: 3px solid var(--cream);
      box-shadow: 0 1px 4px rgba(0,0,0,0.25);
      cursor: grab;
    }

    input[type=range]:focus-visible { outline: 2px solid var(--brass); outline-offset: 4px; }

    #timeline {
      background: linear-gradient(to right, var(--brass) 0%, var(--brass) var(--fill, 0%), var(--line) var(--fill, 0%));
    }

    /* ---------- transport ---------- */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 0.875rem;
    }

    .ctl {
      font-family: var(--sans);
      border: 1px solid var(--line);
      background: transparent;
      color: var(--ink);
      border-radius: 50%;
      width: 50px;
      height: 50px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.12s, border-color 0.15s;
    }
    .ctl:hover { border-color: var(--ink-soft); }
    .ctl:active { transform: scale(0.94); }

    .ctl.play {
      width: 72px;
      height: 72px;
      background: var(--brass);
      border-color: var(--brass);
      color: var(--cream);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .ctl.play:hover { background: var(--brass-deep); border-color: var(--brass-deep); }

    .ctl.play svg { width: 26px; height: 26px; fill: currentColor; }
    #icon-pause { display: none; }
    .ctl.play.playing #icon-play { display: none; }
    .ctl.play.playing #icon-pause { display: block; }

    .status-line {
      text-align: center;
      font-size: 13.5px;
      color: var(--ink-faint);
      margin-bottom: 1.625rem;
      min-height: 18px;
      font-style: italic;
      font-family: var(--serif);
    }

    /* ---------- settings ---------- */
    .setting { margin-bottom: 1.375rem; }
    .setting:last-child { margin-bottom: 0; }

    .setting > label {
      display: block;
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 10px;
    }

    /* speed presets */
    .speed-group {
      display: flex;
      gap: 8px;
    }

    .speed-chip {
      flex: 1;
      font-family: var(--sans);
      font-size: 13.5px;
      font-weight: 600;
      padding: 9px 0;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: transparent;
      color: var(--ink-soft);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .speed-chip:hover { border-color: var(--ink-soft); }

    .speed-chip.selected {
      background: var(--ink);
      border-color: var(--ink);
      color: var(--cream);
    }

    /* voices */
    .voice-list { display: flex; flex-direction: column; gap: 8px; }

    .voice-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: transparent;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .voice-option:hover { border-color: var(--ink-soft); }
    .voice-option.selected { border-color: var(--brass); background: var(--brass-soft); }

    .voice-option .v-name { font-size: 14.5px; font-weight: 500; color: var(--ink); flex: 1; }
    .voice-option .v-tag {
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--brass-deep);
      background: rgba(184,134,59,0.14);
      padding: 3px 9px;
      border-radius: 20px;
      flex-shrink: 0;
    }

    .v-preview {
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-soft);
      background: none;
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 5px 13px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .v-preview:hover { border-color: var(--brass-deep); color: var(--brass-deep); }

    .voice-note { font-size: 12.5px; color: var(--ink-faint); margin-top: 10px; line-height: 1.6; }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }

    @media (max-width: 480px) {
      body { padding: 2.25rem 1rem 3rem; }
      .card { padding: 1.375rem; }
      .speed-chip { font-size: 12.5px; }
    }
  </style>
</head>
<body>

<div class="shelf">

  <div class="masthead">
    <h1>Ghenet's Library</h1>
    <div class="rule"></div>
  </div>

  <div id="drop-zone" onclick="document.getElementById('file-input').click()" role="button" tabindex="0" aria-label="Upload a PDF or text file">
    <div class="dz-glyph">❦</div>
    <p>Drop a book here</p>
    <span>PDF or .txt — or tap to browse</span>
    <input type="file" id="file-input" accept=".pdf,.txt">
  </div>

  <div id="loading-msg">turning the pages&hellip;</div>

  <div id="reader">
    <div class="card">
      <div class="book-meta">
        <div class="book-name" id="book-name">—</div>
        <button class="reset-btn" onclick="resetReader()">new book</button>
      </div>
      <div class="book-pages" id="book-pages">—</div>

      <div class="text-preview" id="preview-text"></div>

      <div class="timeline-wrap">
        <input type="range" id="timeline" min="0" max="100" step="1" value="0"
               aria-label="Book timeline — drag to jump">
        <div class="timeline-labels">
          <span id="tl-elapsed">0%</span>
          <span id="tl-remaining">—</span>
        </div>
      </div>

      <div class="controls">
        <button class="ctl" onclick="skipBack()" aria-label="Back 30 seconds">−30</button>
        <button class="ctl play" id="play-btn" onclick="togglePlay()" aria-label="Play or pause">
          <svg id="icon-play" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
          <svg id="icon-pause" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
        </button>
        <button class="ctl" onclick="skipForward()" aria-label="Forward 30 seconds">+30</button>
      </div>

      <div class="status-line" id="status-txt">ready when you are</div>

      <div class="setting">
        <label>Reading speed</label>
        <div class="speed-group" id="speed-group">
          <button class="speed-chip" data-rate="0.8">0.8×</button>
          <button class="speed-chip selected" data-rate="1">1×</button>
          <button class="speed-chip" data-rate="1.2">1.2×</button>
          <button class="speed-chip" data-rate="1.5">1.5×</button>
        </div>
      </div>

      <div class="setting">
        <label>Voice</label>
        <div class="voice-list" id="voice-list"></div>
        <div class="voice-note" id="voice-note"></div>
      </div>
    </div>
  </div>

</div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  let sentences = [];
  let currentIdx = 0;
  let isPlaying = false;
  let rate = 1;
  let allVoices = [];
  let rankedVoices = [];
  let selectedVoice = null;
  let scrubbing = false;

  const PREVIEW_LINE = "Once upon a time, a very good book found its voice, and it sounded a little like this.";

  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const timeline = document.getElementById('timeline');

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
  dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag'); handleFile(e.dataTransfer.files[0]); });
  fileInput.addEventListener('change', e => handleFile(e.target.files[0]));
  dropZone.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fileInput.click(); } });

  /* ---- voice curation ----
     Tuned for Safari and Chrome.
     Safari (Mac/iPhone): Apple's premium voices — Samantha, Karen, Moira, Zoe,
       Ava, and any Siri voices — are the smoothest.
     Chrome (desktop): the cloud-backed "Google" voices (Google US English,
       Google UK English Female) are far smoother than the local defaults. */
  function scoreVoice(v) {
    const n = v.name.toLowerCase();
    if (!v.lang.toLowerCase().startsWith('en')) return -1;
    let s = 0;

    if (n.includes('google')) s += 45;                    /* Chrome's best */
    if (n.includes('siri')) s += 50;                      /* Safari's best */
    if (/premium|enhanced|natural|neural/.test(n)) s += 40;
    if (['samantha','ava','zoe','karen','moira','serena','allison','susan','joelle','isha','matilda','nicky'].some(k => n.includes(k))) s += 30;
    if (v.lang === 'en-AU') s += 15;                      /* a familiar accent */
    if (v.lang === 'en-GB' || v.lang === 'en-IE') s += 8;
    if (/compact|espeak|novelty|whisper|bells|bad news|good news|organ|cellos|zarvox|trinoids|albert|fred|junior|kathy|ralph/.test(n)) s -= 80;
    return s;
  }

  function friendlyTag(v) {
    const map = { 'en-AU': 'Aussie', 'en-GB': 'British', 'en-IE': 'Irish', 'en-US': 'American', 'en-ZA': 'Sth African', 'en-IN': 'Indian' };
    return map[v.lang] || v.lang;
  }

  function cleanName(v) {
    return v.name
      .replace(/microsoft |apple |online |\(natural\)|\(neural\)|\(premium\)|\(enhanced\)| - english.*$/gi, '')
      .replace(/english \(.*?\)/gi, '')
      .trim() || v.name;
  }

  function loadVoices() {
    allVoices = speechSynthesis.getVoices();
    if (!allVoices.length) return;

    const seen = new Set();
    rankedVoices = allVoices
      .map(v => ({ v, s: scoreVoice(v) }))
      .filter(x => x.s >= 0)
      .sort((a, b) => b.s - a.s)
      .filter(x => {
        const key = cleanName(x.v).toLowerCase();
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      })
      .slice(0, 5)
      .map(x => x.v);

    if (!rankedVoices.length) rankedVoices = allVoices.slice(0, 5);
    if (!selectedVoice || !rankedVoices.includes(selectedVoice)) selectedVoice = rankedVoices[0];
    renderVoices();
  }

  function renderVoices() {
    const list = document.getElementById('voice-list');
    list.innerHTML = '';
    rankedVoices.forEach(v => {
      const row = document.createElement('div');
      row.className = 'voice-option' + (v === selectedVoice ? ' selected' : '');
      row.setAttribute('role', 'button');
      row.setAttribute('tabindex', '0');

      const name = document.createElement('span');
      name.className = 'v-name';
      name.textContent = cleanName(v);

      const tag = document.createElement('span');
      tag.className = 'v-tag';
      tag.textContent = friendlyTag(v);

      const btn = document.createElement('button');
      btn.className = 'v-preview';
      btn.textContent = 'Hear it';
      btn.onclick = (e) => { e.stopPropagation(); previewVoice(v); };

      row.onclick = () => selectVoice(v);
      row.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectVoice(v); } };

      row.appendChild(name);
      row.appendChild(tag);
      row.appendChild(btn);
      list.appendChild(row);
    });

    const ua = navigator.userAgent;
    const isSafari = /safari/i.test(ua) && !/chrome|crios/i.test(ua);
    document.getElementById('voice-note').textContent = isSafari
      ? 'Tip: on iPhone or Mac you can add even smoother voices in Settings → Accessibility → Spoken Content → Voices — new ones appear here automatically.'
      : 'Tip: the Google voices are the smoothest in Chrome. They need an internet connection.';
  }

  function selectVoice(v) {
    selectedVoice = v;
    renderVoices();
    if (isPlaying) { const idx = currentIdx; speechSynthesis.cancel(); speakFrom(idx); }
  }

  function previewVoice(v) {
    speechSynthesis.cancel();
    if (isPlaying) { isPlaying = false; setStatus('idle'); }
    const u = new SpeechSynthesisUtterance(PREVIEW_LINE);
    u.voice = v;
    u.rate = rate;
    speechSynthesis.speak(u);
  }

  speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
  /* Safari sometimes never fires onvoiceschanged — poll briefly as a fallback */
  let voicePolls = 0;
  const voicePoller = setInterval(() => {
    if (rankedVoices.length || ++voicePolls > 10) { clearInterval(voicePoller); return; }
    loadVoices();
  }, 400);

  /* ---- speed chips ---- */
  document.getElementById('speed-group').addEventListener('click', e => {
    const chip = e.target.closest('.speed-chip');
    if (!chip) return;
    rate = parseFloat(chip.dataset.rate);
    document.querySelectorAll('.speed-chip').forEach(c => c.classList.toggle('selected', c === chip));
    if (isPlaying) { const idx = currentIdx; speechSynthesis.cancel(); speakFrom(idx); }
  });

  /* ---- timeline ---- */
  timeline.addEventListener('input', () => {
    scrubbing = true;
    updateTimelineFill();
    const frac = timeline.value / 100;
    const total = totalMinutes() / rate;
    document.getElementById('tl-elapsed').textContent = fmtMins(Math.round(total * frac)) + ' in';
    document.getElementById('tl-remaining').textContent = fmtMins(Math.round(total * (1 - frac))) + ' left';
  });

  timeline.addEventListener('change', () => {
    scrubbing = false;
    const was = isPlaying;
    speechSynthesis.cancel();
    currentIdx = Math.min(sentences.length - 1, Math.max(0, Math.floor((timeline.value / 100) * sentences.length)));
    if (was) { isPlaying = true; speakFrom(currentIdx); } else updateProgress();
  });

  function updateTimelineFill() {
    timeline.style.setProperty('--fill', timeline.value + '%');
  }

  /* ---- file handling ---- */
  async function handleFile(file) {
    if (!file) return;
    showLoading(true);
    document.getElementById('book-name').textContent = file.name.replace(/\.[^.]+$/, '');

    try {
      if (file.type === 'text/plain' || file.name.endsWith('.txt')) {
        const text = await file.text();
        processText(text, 1);
      } else {
        const buf = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
        let text = '';
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          text += content.items.map(s => s.str).join(' ') + '\n';
        }
        processText(text, pdf.numPages);
      }
    } catch (err) {
      showLoading(false);
      alert("Couldn't read that file — try another PDF or a .txt file.");
      console.error(err);
    }
  }

  function processText(text, pages) {
    const clean = text.replace(/\s+/g, ' ').trim();
    sentences = (clean.match(/[^.!?]+[.!?]+[\s]*/g) || [clean]).filter(s => s.trim().length > 3);
    currentIdx = 0;
    document.getElementById('book-pages').textContent =
      `${pages} page${pages > 1 ? 's' : ''} · about ${estimateTime()} at 1×`;
    document.getElementById('preview-text').textContent =
      clean.slice(0, 1200) + (clean.length > 1200 ? '…' : '');
    showLoading(false);
    document.getElementById('reader').style.display = 'block';
    updateProgress();
  }

  function totalMinutes() {
    const words = sentences.join(' ').split(/\s+/).length;
    return Math.max(1, Math.round(words / 160));
  }

  function estimateTime() {
    const mins = totalMinutes();
    if (mins < 60) return `${mins} min`;
    return `${Math.floor(mins / 60)}h ${mins % 60}m`;
  }

  function showLoading(show) {
    document.getElementById('loading-msg').style.display = show ? 'block' : 'none';
    document.getElementById('drop-zone').style.display =
      show || document.getElementById('reader').style.display === 'block' ? 'none' : 'block';
  }

  /* ---- playback ---- */
  function setStatus(state) {
    const txt = document.getElementById('status-txt');
    const btn = document.getElementById('play-btn');
    btn.classList.toggle('playing', state === 'playing');
    if (state === 'playing') txt.textContent = 'reading to you…';
    else if (state === 'paused') txt.textContent = 'paused — pick up any time';
    else txt.textContent = 'ready when you are';
  }

  function fmtMins(mins) {
    if (mins < 1) return 'under a minute';
    if (mins < 60) return `${mins} min`;
    return `${Math.floor(mins / 60)}h ${mins % 60}m`;
  }

  function updateProgress() {
    const frac = sentences.length ? currentIdx / sentences.length : 0;
    if (!scrubbing) {
      timeline.value = Math.round(frac * 100);
      updateTimelineFill();
    }
    const total = totalMinutes() / rate;
    const elapsed = Math.round(total * frac);
    const left = Math.round(total * (1 - frac));
    document.getElementById('tl-elapsed').textContent = fmtMins(elapsed) + ' in';
    document.getElementById('tl-remaining').textContent = fmtMins(left) + ' left';
  }

  /* One sentence per utterance:
     - pause/resume works reliably in every browser (we cancel and remember
       the exact sentence, since speechSynthesis.pause() is broken with
       Chrome's Google voices)
     - sidesteps Chrome's bug where long utterances stop after ~15s */
  function speakFrom(idx) {
    speechSynthesis.cancel();
    if (idx >= sentences.length) { isPlaying = false; currentIdx = 0; setStatus('idle'); updateProgress(); return; }
    currentIdx = idx;
    updateProgress();
    const u = new SpeechSynthesisUtterance(sentences[idx]);
    u.voice = selectedVoice;
    u.rate = rate;
    u.onend = () => {
      if (!isPlaying) return;
      speakFrom(idx + 1);
    };
    u.onerror = (e) => {
      if (e.error === 'interrupted' || e.error === 'canceled') return;
      isPlaying = false;
      setStatus('idle');
    };
    speechSynthesis.speak(u);
    setStatus('playing');
  }

  function togglePlay() {
    if (isPlaying) {
      /* cancel-based pause: remembers the current sentence exactly */
      isPlaying = false;
      speechSynthesis.cancel();
      setStatus('paused');
    } else {
      isPlaying = true;
      speakFrom(currentIdx);
    }
  }

  function skipBack() {
    const was = isPlaying;
    speechSynthesis.cancel();
    currentIdx = Math.max(0, currentIdx - 15);
    if (was) { isPlaying = true; speakFrom(currentIdx); } else updateProgress();
  }

  function skipForward() {
    const was = isPlaying;
    speechSynthesis.cancel();
    currentIdx = Math.min(sentences.length - 1, currentIdx + 15);
    if (was) { isPlaying = true; speakFrom(currentIdx); } else updateProgress();
  }

  function resetReader() {
    speechSynthesis.cancel();
    isPlaying = false;
    sentences = [];
    currentIdx = 0;
    document.getElementById('reader').style.display = 'none';
    document.getElementById('drop-zone').style.display = 'block';
    fileInput.value = '';
    setStatus('idle');
  }
</script>
</body>
